assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: “ロイヤルパームホテル” に関する “お客様の声” のリンクからフォーカスを移動させずに、そのリンクの目的を表す見出しの内容 “ロイヤルパームホテル” を知るための何らかの手段が提供されている
    procedure: テストファイルを読み上げ、内容を確認
    actual: |-
      フォーカスを移動せず確認することはできない。
       
       検索キー＋下矢印キーを押下していくと以下の順に読み上げる。
       
       ロイヤルパームホテル 見出し2
       箇条書き 地図 リンク リスト項目 リストに5件の項目
       箇条書き 写真 リンク リスト項目
       箇条書き アクセス リンク リスト項目
       箇条書き お客様の声 アクセス済み リンク リスト項目
       箇条書き ご予約 リンク リスト項目
       ホテルスリーリバーズ 見出し2
       箇条書き 地図 リンク リスト項目 リストに5件の項目
       箇条書き 写真 リンク リスト項目
       箇条書き アクセス リンク リスト項目
       箇条書き お客様の声 リンク リスト項目
       箇条書き ご予約 リンク リスト項目
    judgment: 満たしていない
environment_type: 音声閲覧環境
comment: しかし検索キー＋Shiftキー＋hキーで前の見出しにフォーカスを戻し読み上げることはできる。
tester: 四方田正夫
