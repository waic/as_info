contents:
  - expected: |-
      次の 1. 〜 2. をすべて満たしている
       
       1. それぞれのテキスト入力フィールドにフォーカスを移動すると、次のように関連付けられたラベルを知るための何らかの手段が提供されている
       
       “1.” のテキスト入力フィールド : ラベル “姓” 
       
       “2.” のテキスト入力フィールド : ラベル “名” 
       
       “3.” のテキスト入力フィールド : ラベル “住所” 
       
       “4.” のテキスト入力フィールド : ラベル “電話番号” 
       
       2. “4.” のテキスト入力フィールドにフォーカスを移動すると、 “ハイフンは不要” は読み上げられない
       
       テスト実施時の注意点 (音声閲覧環境) :2. では、テキスト入力フィールドとラベルの位置関係による関連付けではなく、label 要素 (内のテキストのみ) による関連付けかどうかを確認している
    procedure: テストファイルを操作し、結果を確認
    actual: |-
      TABキーを押下していくと、以下の順に読み上げる。
       
       姓 テキスト編集
       名 テキスト編集
       住所: テキスト編集
       :電話番号 テキスト編集
    judgment: 満たしている
