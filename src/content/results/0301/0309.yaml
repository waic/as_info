assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: |-
      次の 1. 〜 2. をすべて満たしている
       
       1. それぞれのラジオボタンにフォーカスを移動すると、次のように関連付けられたラベルを知るための何らかの手段が提供されている
       
       “1.” のラジオボタン : ラベル “チョコレートタイプ” 
       
       “2.” のラジオボタン : ラベル “クリームたっぷりタイプ” 
       
       “3.” のラジオボタン : ラベル “すっきり抹茶タイプ” 
       
       “4.” のラジオボタン : ラベル “はちみつがけタイプ” 
       
       2. “3.” のラジオボタンにフォーカスが移動すると、 “期間限定” は読み上げられない
       
       テスト実施時の注意点 (音声閲覧環境) :2. では、ラジオボタンとラベルの位置関係による関連付けではなく、label 要素 (内のテキストのみ) による関連付けかどうかを確認している
    procedure: テストファイルを操作し、結果を確認
    actual: |-
      TABキーを押して最初のラジオボタンに移動し、その後下矢印キーを押していくと以下の順に読み上げる。
       
       チョコレートタイプ、選択されていないラジオボタン 4分の1 検索プラススペースキーで切り替えます。
       クリームたっぷりタイプ、選択されたラジオボタン 4分の2 検索プラススペースキーで切り替えます。
       すっきり抹茶タイプ、選択されたラジオボタン 4分の3 検索プラススペースキーで切り替えます。
       はちみつがけタイプ、選択されたラジオボタン 4分の4 検索プラススペースキーで切り替えます。
    judgment: 満たしている
environment_type: 音声閲覧環境
