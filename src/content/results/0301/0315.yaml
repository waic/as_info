assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: |-
      次の 1. 〜 4. をすべて満たしている
       
       1. 説明リスト (dl) であること及びリスト項目 (dt) の数を知る何らかの手段が提供されている
       
       2. 説明リスト (dl) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       3. リスト項目 (dt) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       4. dd 要素の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       テスト実施時の注意点 (音声閲覧環境) :例えば、“3項目の記述リスト リスト項目の開始 用語 略語 (abbreviation) 定義 単語、語句、又は名称の短縮形で、その略語が言語の一部になっていないもの。 リスト項目の終了…” と読み上げられる場合は OK と判断
       
       3. については、次のリスト項目 (dt) に移動する機能を提供している場合も OK と判断
       
       4. については、次の dd 要素に移動する機能を提供している場合も OK と判断
       
       ただし、dt 要素をまたいで移動する場合は NG と判断
    procedure: 説明リストを読み上げ、内容を確認
    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       重要な用語の意味を説明します。
       略語 (abbreviation)
       単語、語句、又は名称の短縮形で、その略語が言語の一部になっていないもの。
       ASCII アート (ASCII art)
       文字やグリフの空間的配置によって作られた図画 (典型的には、ASCIIで定義されている95の印字可能文字から作られる)。
       点滅 (blinking)
       注意を引く意図で、二つの視覚的な状態を交互に切り替えること。
       似ている言葉として閃光がある。
       詳細については文末の用語集をご参照ください。
    judgment: 満たしていない
environment_type: 音声閲覧環境
