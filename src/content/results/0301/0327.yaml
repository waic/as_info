contents:
  - expected: |-
      次の 1. 〜 3. をすべて満たしている
       
       1. それぞれのテキスト入力フィールドにフォーカスを移動すると、対応する legend 要素の内容 “ご自宅” または “商品の送付先” が通知される
       
       2. “メールアドレス” に差し掛かると、直前の fieldset 要素内のグループの一要素であると誤解されるような通知をされない
       
       3. fieldset 要素の開始位置及び終了位置を知るための何らかの手段が提供されている
    procedure: テキスト入力フィールドのグループを読み上げ、内容を確認
    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       商品の配送先、及びご自宅住所を記入してください。
       住所: テキスト編集 郵便番号: テキスト編集 ご自宅 フォーム
       住所: テキスト編集 郵便番号: テキスト編集 商品の送付先
       メールアドレス: テキスト編集
       記入が済みましたら「お支払い情報の選択」へお進みください。フォームの外に出ました。
    judgment: 満たしている
