assistive_tech: 'ChromeVox Google TTS Setting : Chrome OS 日本語 インストール済み'
assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: |-
      次の 1. 〜 4. をすべて満たしている
       
       1. 順序付きリスト (ol) であること及びリスト項目 (li) の数を知る何らかの手段が提供されている
       
       2. 順序付きリスト (ol) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       3. 各リスト項目の番号が読み上げられる
       
       4. リスト項目 (li) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       テスト実施時の注意点 (音声閲覧環境) :例えば、“2項目のリスト リストの開始 1. ボウルにたまごと牛乳を入れ、混ぜます。 2. 塩とコショウを加えます。 リストの終了” と読み上げられる場合は OK と判断
       
       4. については、次のリスト項目 (li) に移動する機能を提供している場合も OK と判断
    procedure: 順序付きリストを読み上げ、内容を確認
    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       オムレツの作り方は以下の通りです。
       1．ボウルにたまごと牛乳を入れ、混ぜます。リスト項目 リストに2件の項目
       2．塩とコショウを加えます。リスト項目
       材料については「オムレツの材料 リンク 」をご覧ください。
       
       ※次のリスト項目 (li) に移動する機能は提供されていない
    judgment: 満たしている
environment_type: 音声閲覧環境
comment: ”リストに2件の項目”と読み上げている
