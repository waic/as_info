contents:
  - expected: |-
      次の 1. 〜 3. をすべて満たしている
       
       1. 順序なしリスト (ul) であること及びリスト項目 (li) の数を知る何らかの手段が提供されている
       
       2. 順序なしリスト (ul) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       3. リスト項目 (li) の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       テスト実施時の注意点 (音声閲覧環境) :例えば、“3項目のリスト リストの開始 牛乳 卵 バター リストの終了” と読み上げられる場合は OK と判断
       
       3. については、次のリスト項目 (li) に移動する機能を提供している場合も OK と判断
    procedure: 順序なしリストを読み上げ、内容を確認
    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       オムレツの材料は以下の通りです。
       箇条書き 牛乳 リスト項目 リストに3件の項目
       箇条書き 卵 リスト項目
       箇条書き バター リスト項目
       作り方の詳細は「オムレツの作り方」をご覧ください。
       
       ※次のリスト項目 (li) に移動する機能は提供されていない
    judgment: 満たしている
