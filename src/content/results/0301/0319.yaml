    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       ヘレン・ケラーは言いました、 「自己憐憫は私たちの最悪の敵です。もし、それに自らを委ねるなら、 私たちは世の中で決して賢明なことができないでしょう。」と。この言葉は私の中で
       とても強く印象に残っています。
    judgment: 満たしていない
