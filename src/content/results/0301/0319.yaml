      次の 1. 〜 2. をすべて満たしている
       
       1. “自己憐憫は私たちの最悪の敵です。” に差し掛かかると、この部分が引用であることが通知される
       
       2. 引用部分の開始位置及び終了位置を知るための何らかの手段が提供されている
       
       テスト実施時の注意点 (音声閲覧環境) :行読みモードやブラウザモードなどで読み上げると、引用であることが自動的に通知されない場合は NG と判断
