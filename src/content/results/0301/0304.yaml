id: 304
test: 0011-01
os: Chrome OS 71
user_agent: Chrome OS 71.0.3578.94(64bit)
assistive_tech: 'ChromeVox Google TTS Setting : Chrome OS 日本語 インストール済み'
assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: |-
      次の 1. 〜 3. をすべて満たしている
       
       1. 見出し要素に差し掛かかると、それが見出しであることが通知される 
       
       2. 見出しレベルを知るための何らかの手段が提供されている 
       
       3. 次のように見出しの内容と見出しレベルが合致している 
       
       見出しレベル 1 : 果物について 
       
       見出しレベル 2 : 定義 
       
       見出しレベル 3 : 野菜との違い 
       
       見出しレベル 4 : 実は果物ではないもの 
       
       見出しレベル 5 : スイカが野菜である理由 
       
       見出しレベル 6 : スイカの発見 
       
       見出しレベル 2 : 人間と果物のかかわり
    procedure: 見出しを読み上げ、内容を確認
    actual: |-
      検索キー＋下矢印キーを押下していくと、以下の順に読み上げる。
       
       果物について 見出し1
       このページでは、果物について解説する。
       定義 見出し2
       果物とは三点リーダー
       野菜との違い 見出し3
       果物と野菜の一番の違いは三点リーダー
       実は果物ではないもの 見出し4
       一般的には果物と思われがちだが、スイカは野菜である。
       スイカが野菜である理由 見出し5
       そもそもスイカは三点リーダー
       スイカの発見 見出し6
       世界で初めてスイカが発見されたのは三点リーダー
       人間と果物のかかわり 見出し2
       古くから人間は三点リーダー
    judgment: 満たしている
environment_type: 音声閲覧環境
