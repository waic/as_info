contents:
  - expected: |-
      次の 1. 〜 2. をすべて満たしている
       
       1. “Last Name” の列へ移動すると、データセルの内容とともに見出しセルの内容 “Last Name” が読み上げられる 
       
       2. セル “Pittsburgh” から “City” に移動すると、“Last Name” は読み上げられない
    procedure: テーブル内のセルを移動し、読み上げ内容を確認
    actual: |-
      1．“Contact Information” のテーブルにおいて、“First Name” から “Last Name” へ検索プラスcontrolプラスAltキーを押しながら右矢印キーを押して移動すると、以下を読み上げる
       
       Last Name 行1列3 Last Name
       
       2．“Contact Information” のテーブルにおいて、“Pittsburgh” から “City” へ検索プラスcontrolプラスAltキーを押しながら上矢印キーを押して移動すると、以下を読み上げる
       
       City 行1列4
    judgment: 満たしている
