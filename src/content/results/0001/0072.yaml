contents:
  - expected: |-
      次の 1. 〜 4. をすべて満たしている
      1. ラベル “山田荘” をクリックすると、“1.” のチェックボックスにフォーカスが移動する
      2. ラベル “田中アパート” をクリックすると、“2.” のチェックボックスにフォーカスが移動する 
      3. ラベル “佐藤マンション” をクリックすると、“3.” のチェックボックスにフォーカスが移動する 
      4. “定期借家” をクリックしても “3.” のチェックボックスにフォーカスが移動しない
    procedure: ラベル・テキスト「定期借家」をクリックし、挙動を確認した。
    actual: |-
      以下のような挙動であった。
      1. ラベル “山田荘” をクリックすると、“1.” のチェックボックスのチェック状態が切り替わった。
      2. ラベル “田中アパート” をクリックすると、“2.” のチェックボックスのチェック状態が切り替わった。 
      3. ラベル “佐藤マンション” をクリックすると、“3.” のチェックボックスのチェック状態が切り替わった。
      4. “定期借家” をクリックしても “3.” のチェックボックスのチェック状態は切り替わらなかった。
    judgment: 満たしている
environment_type: 視覚閲覧環境
comment: ラベルをクリックした時にフォーカスリングがチェックボックスに表示されないように思うが、チェックボックスのチェック状態が切り替わるので、テストの目的「label 要素に指定したラベルとチェックボックスが関連付いているか」は確認できたと考え、満たしていると判断した。
