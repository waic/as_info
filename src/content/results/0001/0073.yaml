id: 73
test: 0012-03
os: macOS 10.14.2
user_agent: Firefox 64.0
assistive_tech:
assistive_tech_config:
contents:
  - expected: |-
      次の 1. 〜 5. をすべて満たしている
      1. ラベル “はちみつがけタイプ” をクリックすると、“4.” のラジオボタンにフォーカスが移動する 
      2. ラベル “クリームたっぷりタイプ” をクリックすると、“2.” のラジオボタンにフォーカスが移動する 
      3. ラベル “すっきり抹茶タイプ” をクリックすると、“3.” のラジオボタンにフォーカスが移動する 
      4. ラベル “チョコレートタイプ” をクリックすると、“1.” のラジオボタンにフォーカスが移動する
      5. “期間限定” をクリックしても “3.” のラジオボタンにフォーカスが移動しない
    procedure: ラベル・テキスト「期間限定」をマウスでクリックし、挙動を確認した。
    actual: |-
      次の 1. 〜 5. のようになった。
      1. ラベル “はちみつがけタイプ” をクリックすると、“4.” のラジオボタンの選択状態が切り替わった。
      2. ラベル “クリームたっぷりタイプ” をクリックすると、“2.” のラジオボタンの選択状態が切り替わった。
      3. ラベル “すっきり抹茶タイプ” をクリックすると、“3.” のラジオボタンの選択状態が切り替わった。
      4. ラベル “チョコレートタイプ” をクリックすると、“1.” のラジオボタンの選択状態が切り替わった。
      5. “期間限定” をクリックしても “3.” のラジオボタンの選択状態は切り替わらなかった。
    judgment: 満たしている
environment_type: 視覚閲覧環境
comment: 先に送信した0012-03同様、ラベルをクリックした時にラジオボタンにフォーカスリングは表示されなかった。しかし、ラジオボタンの選択状態が切り替わることから「label 要素に指定したラベルとラジオボタンが関連付いているかの確認」は確認できていると考え、満たしていると判断した。
tester: 安倍 英樹
