  - expected: イメージマップであることを判別できるような情報が提供されている
    procedure: キーボード操作で移動し、読み上げを確認
    actual: imgのaltを読み上げたあと「イメージマップ」と読み上げられる。続いて「現在、あなたはWebコンテンツ内のイメージマップ上にいます。このWeb領域を終了するには、コントロール-Option-Shift-上矢印を押します」とガイドされる。その後要素内遷移（コントロール＋Option＋Shift＋下矢印）を行うと「操作開始　デパートのフロアガイド。各階について詳しくお知りになりたい場合は各階をクリックしてください、イメージマップ、４項目、リンク　４階雑貨 書籍」「現在、あなたはイメージマップ内のリンクの上にいます。このリンクをクリックするには、コントロール-Option-スペースを押します。」と読まれる。以下のリンクに移動（Option＋Shift＋下矢印）すると「リンク、３階衣料品　現在、あなたはイメージマップ内のリンクの上にいます。このリンクをクリックするには、コントロール-Option-スペースを押します。」のように読まれる。
    judgment: 満たしている
environment_type: 音声閲覧環境
comment: MacOSが最新のバージョンではありません。また、不慣れなため動作に関する表現等伝わりにくいかと思います。これでもお役に立てるならうれしいです。
