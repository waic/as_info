  - procedure: テストサイトにVoiceOverを立ち上げた状態で入った。スクリーンカーテンオンとオフ状態を両方試みた。通しで読むことと、ローターをランドマークに合わせて移動することと両方試みた。
    actual: ローターをランドマークに合わせて移動した場合、「組織　リンク　ナビゲーションランドマーク　「2個のランドマーク」情報　リンク　ランドマーク」と読み上げられた。なお、「2個のランドマーク」は読んだり読み上げられなかったりした。
    judgment: 満たしている
environment_type: 音声閲覧環境
comment: そもそもこのランドマークが配置されているウェブサイトがほとんどない上に、ランドマークが何を意味するのか検索をかけても横浜のランドマークしか出てこなかった経験があります。よって、デフォルトでローターにランドマークが入っていたかもしれませんが、外していました。
