    procedure: 'キーボード操作 : Tab キーを押下し、フォーカスの移動順序を確認'
    actual: |-
      TABキーを押下すると、以下の順に読み上げていく。
       WAIC-CODE-0003-01 行2 列2 送り先1 姓 表「グリーティングカードのオーダーフォーム」（8x3） フォーム 1番目の受取人の名字 テキスト編集 検索 プラス control プラス Altキーを押しながら矢印キーを押してセル間を移動します。
       
       1番目の受取人の名前 テキスト編集 行3列2 名
       
       1番目の受取人の住所 テキスト編集 行4列2 住所
       
       スイカ 選択されていないラジオボタン 2分の1 1番目の受取人へのカードデザイン：スイカ 行5列2 カードのデザイン 検索プラススペースキーで切り替えます。
       
       スイカ 選択されていないラジオボタン 2分の1 1番目の受取人へのカードデザイン：スイカ 行5列2 カードのデザイン 検索プラススペースキーで切り替えます。
       
       オリジナルスタンプ チェックボックス オフ 1番目の受取人へのオリジンルスタンプ 行6列2 オプション 検索プラススペースキーで切り替えます。
       
       メロディカード チェックボックス オフ 1番目の受取人へのメロディカード 検索プラススペースキーで切り替えます。
       
       1番目の受取人へのメッセージ テキスト領域 行7列2 メッセージ 検索、左またｈ右矢印でホームまたはエンドになります。検索、コントロール、左または右矢印で、コントロールホームまたはコントロールエンドになります。検索、コントロール、上矢印または下矢印で、ページアップまたはページダウンになります。
       
       1番目の受取人へのカードプレビュー ボタン 行8列2 確認 検索プラススペースキーで有効にします。
       
       2番目の受取人の名字 テキスト編集 行2 列3 送り先2 姓
       
       2番目の受取人の名前 テキスト編集 行3列3 名
       
       2番目の受取人の住所 テキスト編集 行4列3 住所
       
       スイカ 選択されていないラジオボタン 2分の1 2番目の受取人へのカードデザイン：スイカ 行5列3 カードのデザイン 検索プラススペースキーで切り替えます。
       
       オリジナルスタンプ チェックボックス オフ 2番目の受取人へのオリジンルスタンプ 行6列3 オプション 検索プラススペースキーで切り替えます。
       
       メロディカード チェックボックス オフ 2番目の受取人へのメロディカード 検索プラススペースキーで切り替えます。
       
       2番目の受取人へのメッセージ テキスト領域 行7列3 メッセージ 検索、左または右矢印でホームまたはエンドになります。検索、コントロール、左または右矢印で、コントロールホームまたはコントロールエンドになります。検索、コントロール、上矢印または下矢印で、ページアップまたはページダウンになります。
       
       2番目の受取人へのカードプレビュー ボタン 行8列3 確認 検索プラススペースキーで有効にします。
       
       注文内容の確認 ボタン 行の外に出ました。検索プラススペースキーで有効にします。
       
       入力内容のリセット ボタン 検索プラススペースキーで有効にします。
    judgment: 満たしていない
environment_type: 音声閲覧環境
comment: |-
  ラジオボタンの選択肢はタブキーでは移動しない。ChromeVoxの挙動が適切で、期待される結果が不適切と思われる。
   
   ラジオボタンの選択肢はタブキーでは移動しない。ChromeVox稼働中であるか否かにかからわず、ラジオボタングループの中ではタブキーではなく上下矢印キーでフォーカスを切り替える。
reviewer_comment: '[WAIC注]実施日を2018年から2019年に訂正しました。'
