assistive_tech_config: |-
  参考：Chromebook ヘルプ / 組み込みのスクリーン リーダーを使用する
   https://support.google.com/chromebook/answer/7031755?hl=ja
contents:
  - expected: |-
      次の 1. 〜 2. をすべて満たしている
       
       1. テキストのみを含むセルと関連付けられている列見出しを知るための何らかの手段が提供されている 
       
       2. リンクを含むセルと関連付けられている列見出しを知るための何らかの手段が提供されている
       
       テスト実施時の注意点 (音声閲覧環境) :例えば “営業部連絡先一覧” のテーブルにおいて、“281-511-6600” から “ヒューストン” へ移動すると、 “住所 ヒューストン” と読み上げられる場合は OK と判断
       
       また例えば “営業部連絡先一覧” のテーブルにおいて、“ヒューストン” を読み上げた後、何らかのキー操作によって “ゴードン・グリーニッジ 住所 ヒューストン” と読み上げられる場合は OK と判断
    procedure: テーブル内の同じ行のセルを移動し、読み上げ内容を確認
    actual: |-
      1．“営業部連絡先一覧” のテーブルにおいて、“281-511-6600” から “ヒューストン” へ検索プラスcontrolプラスAltキーを押しながら右矢印キーを押して移動すると、以下を読み上げる
       
       ヒューストン 行3列4 住所
       
       2．“営業部連絡先一覧” のテーブルにおいて、“ピッツバーグ” から “Twitter” へ検索プラスcontrolプラスAltキーを押しながら右矢印キーを押して移動すると、以下を読み上げる
       
       Twitter リンク 行4列5 SNS 検索プラススペースキーで有効にします。
    judgment: 満たしている
environment_type: 音声閲覧環境
