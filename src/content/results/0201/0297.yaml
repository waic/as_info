contents:
  - expected: テーブルの開始位置及び終了位置を知るための何らかの手段が提供されている
    procedure: テーブルを読み上げ、内容を確認
    actual: |-
      テーブルにフォーカスを移動し、検索プラスcontrolプラスAltキーを押しながら矢印キーを押してセル間を移動する→
       ・左端の列のセルで検索プラスcontrolプラスAltキーを押しながら左矢印キーを押すと 左にセルはありません と読みあげる。
       ・右端の列のセルで検索プラスcontrolプラスAltキーを押しながら右矢印キーを押すと 右にセルはありません と読みあげる。
       ・上端の行のセルで検索プラスcontrolプラスAltキーを押しながら下矢印キーを押すと 上にセルはありません と読みあげる。
       ・下端の行のセルで検索プラスcontrolプラスAltキーを押しながら下矢印キーを押すと 下にセルはありません と読みあげる。
    judgment: 満たしている
