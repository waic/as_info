  - expected: アイコン画像の代替テキストは何も読み上げられず、リンクテキスト “ウェブアクセシビリティ基盤委員会公開サイト” のみが読み上げられる
    procedure: |-
      （視覚閲覧環境）ブラウザを画像非表示に設定変更にしたままの状態で閲覧
      （音声閲覧環境）リンク「ウェブアクセシビリティ基盤委員会公開サイト」にカーソルを当ててテスト。
      操作は、以下の３種「マウス」「Tabキー」「タッチディスプレイ上で指で長押し（タップではない）」
    actual: |-
      アイコン画像の代替テキストは何も読み上げられず、リンクテキスト “ウェブアクセシビリティ基盤委員会公開サイト” のみが読み上げられた。

      ただ、操作方法によってNVDAでの挙動に違いがみられた。
      使用しているPC機種に由来する挙動かと推察。

      1.「マウス」での操作の場合
      2.「Tabキー」での操作の場合
      いずれもページタイトルから読み上げ始める

      3.「タッチディスプレイ上で指で長押し」
      期待される結果のように、該当文のみ読み上げられた
    judgment: 満たしている
